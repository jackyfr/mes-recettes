<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salade De Pates Jb Cru Burrata</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fafafa; color: #222; }
  .hero { width: 100%; height: 280px; object-fit: cover; display: block; }
  .container { max-width: 680px; margin: 0 auto; padding: 24px 20px 48px; }
  h1 { font-size: 26px; font-weight: 700; color: #1a1a1a; margin-bottom: 20px; line-height: 1.2; }
  .section { margin-bottom: 28px; }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
  .ingredient-list { list-style: none; }
  .ingredient-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 15px; }
  .ingredient-name { color: #333; }
  .ingredient-qty { color: #666; font-weight: 500; white-space: nowrap; margin-left: 16px; }
  .steps { color: #333; font-size: 15px; line-height: 1.7; white-space: pre-line; }
  .no-recipe { color: #999; font-style: italic; font-size: 15px; }
</style>
</head>
<body>
<img class="hero" src="https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?auto=compress&cs=tinysrgb&w=800" alt="Salade De Pates Jb Cru Burrata" onerror="this.style.background='#e0e0e0';this.style.height='100px'">
<div class="container">
  <h1>Salade De Pates Jb Cru Burrata</h1>
  <div class="section">
    <div class="section-title">Ingrédients</div>
    <ul class="ingredient-list">
      <li class="ingredient-item"><span class="ingredient-name">Burrata</span><span class="ingredient-qty">125g</span></li>
      <li class="ingredient-item"><span class="ingredient-name">Creme De Balsamique</span><span class="ingredient-qty">25g</span></li>
      <li class="ingredient-item"><span class="ingredient-name">Jambon Serrano</span><span class="ingredient-qty">60g</span></li>
      <li class="ingredient-item"><span class="ingredient-name">Pates Farfalle Soubry</span><span class="ingredient-qty">160g</span></li>
      <li class="ingredient-item"><span class="ingredient-name">Roquette</span><span class="ingredient-qty">20g</span></li>
    </ul>
  </div>
  <div class="section">
    <div class="section-title">Préparation</div>
    <p class="no-recipe">Voir instructions sur l'emballage ou préparer selon votre habitude.</p>
  </div>
</div>
</body>
</html>
