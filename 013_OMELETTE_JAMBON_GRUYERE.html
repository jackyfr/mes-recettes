<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omelette Jambon Gruyere</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fafafa; color: #222; }
  .hero { width: 100%; height: 280px; object-fit: cover; display: block; }
  .container { max-width: 680px; margin: 0 auto; padding: 24px 20px 48px; }
  h1 { font-size: 26px; font-weight: 700; color: #1a1a1a; margin-bottom: 20px; line-height: 1.2; }
  .section { margin-bottom: 28px; }
  .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid #eee; }
  .ingredient-list { list-style: none; }
  .ingredient-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 15px; }
  .ingredient-name { color: #333; }
  .ingredient-qty { color: #666; font-weight: 500; white-space: nowrap; margin-left: 16px; }
  .steps { color: #333; font-size: 15px; line-height: 1.7; white-space: pre-line; }
  .no-recipe { color: #999; font-style: italic; font-size: 15px; }
</style>
</head>
<body>
<img class="hero" src="https://images.pexels.com/photos/9510/food-salad-healthy-lunch.jpg?auto=compress&cs=tinysrgb&w=800" alt="Omelette Jambon Gruyere" onerror="this.style.background='#e0e0e0';this.style.height='100px'">
<div class="container">
  <h1>Omelette Jambon Gruyere</h1>
  <div class="section">
    <div class="section-title">Ingrédients</div>
    <ul class="ingredient-list">
      <li class="ingredient-item"><span class="ingredient-name">Dés De Jambon</span><span class="ingredient-qty">150g</span></li>
      <li class="ingredient-item"><span class="ingredient-name">Gruyere</span><span class="ingredient-qty">50g</span></li>
      <li class="ingredient-item"><span class="ingredient-name">Oeuf (53G)</span><span class="ingredient-qty">× 7</span></li>
      <li class="ingredient-item"><span class="ingredient-name">Origan / Oregano</span><span class="ingredient-qty">10g</span></li>
      <li class="ingredient-item"><span class="ingredient-name">Pain Complet</span><span class="ingredient-qty"></span></li>
    </ul>
  </div>
  <div class="section">
    <div class="section-title">Préparation</div>
    <div class="steps">Battre les oeufs, ajouter les dés de jambon et le fromage, assaisonner de sel, poivre, origan. Cuire dans une poêle anti-adhésive.</div>
  </div>
</div>
</body>
</html>
